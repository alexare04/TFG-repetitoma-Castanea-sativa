name: castanea_repetitive_dna
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # Command-line tools
  - bedtools
  - repeatmasker
  - repeatmodeler
  - edta

  # Python
  - python

  # R
  - r-base
  - r-tidyverse
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-patchwork

  # Bioconductor packages
  - bioconductor-genomicranges
  - bioconductor-genomeinfodb
  - bioconductor-rtracklayer
  - bioconductor-biostrings
  - bioconductor-clusterprofiler
  - bioconductor-go.db
  - bioconductor-annotationdbi
